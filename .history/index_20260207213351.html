<!DOCTYPE html>
<html>

<head>
    <title>Student Expense Tracker</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
        <h2>📊 Monthly Expense Tracker</h2>

        <div class="input-section">
            <input type="number" id="amount" placeholder="Amount (e.g. 500)" required>
            <select id="category">
                <option value="1">Food</option>
                <option value="2">Entertainment</option>
                <option value="3">Study Material</option>
            </select>
            <input type="date" id="date">
            <button onclick="saveExpense()">Add Expense</button>
        </div>

        <div class="chart-container">
            <canvas id="myPieChart"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
