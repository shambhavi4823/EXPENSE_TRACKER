<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseTracker - Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f4f6f9;
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 260px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
        }
        
        .sidebar .logo {
            font-size: 22px;
            font-weight: bold;
            padding: 0 25px 20px 25px;
            border-bottom: 1px solid #34495e;
            margin-bottom: 20px;
        }
        
        .sidebar .logo span {
            color: #3498db;
        }
        
        .sidebar a {
            color: #bdc3c7;
            text-decoration: none;
            padding: 12px 25px;
            display: block;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .sidebar a:hover,
        .sidebar a.active {
            color: white;
            background-color: #34495e;
            border-left: 4px solid #3498db;
        }
        
        .sidebar .logout {
            margin-top: auto;
            border-top: 1px solid #34495e;
            padding-top: 15px;
        }
        
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 40px;
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #2c3e50;
            font-size: 28px;
        }
        
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1100px;
        }
        
        .settings-card {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }
        
        .settings-card h3 {
            color: #2c3e50;
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f2f6;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eaeded;
            border-radius: 8px;
            font-size: 15px;
            color: #2c3e50;
            background-color: #fcfcfc;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            border-color: #3498db;
            background-color: white;
        }
        
        .btn-save {
            width: 100%;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }
        
        .btn-budget {
            background-color: #3498db;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.2);
        }
        
        .btn-budget:hover {
            background-color: #2980b9;
        }
        
        .btn-password {
            background-color: #e67e22;
            box-shadow: 0 4px 12px rgba(230, 126, 34, 0.2);
        }
        
        .btn-password:hover {
            background-color: #d35400;
        }
        
        @media (max-width: 900px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo">💸 Wallet<span>Wise</span></div>
        <a href="user_dashboard.html">📊 Dashboard</a>
        <a href="add_expense.html">➕ Add Expense</a>
        <a href="expense_history.html">📋 My Expenses</a>
        <a href="search_expenses.html">🔍 Search Filters</a>
        <a href="settings.html" class="active">⚙️ Budget & Password</a>
        <a href="index.html" class="logout">👋 Logout</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Account Settings</h1>
            <p style="color: #7f8c8d; font-size: 14px; margin-top: 5px;">Update your threshold limits and secure your account credentials.</p>
        </div>

        <div class="settings-grid">
            <div class="settings-card">
                <h3>💰 Monthly Budget Management</h3>
                <form id="budgetForm">
                    <div class="form-group">
                        <label for="current_budget">Current Budget Limit (Read Only)</label>
                        <input type="text" id="current_budget" value="Loading..." disabled style="background-color: #f1f2f6; color: #7f8c8d;">
                    </div>
                    <div class="form-group">
                        <label for="new_budget">Enter New Budget Limit (₹)</label>
                        <input type="number" id="new_budget" name="new_budget" min="1" placeholder="e.g., 15000" required>
                    </div>
                    <button type="submit" class="btn-save btn-budget">⚙️ Update Limit</button>
                </form>
            </div>

            <div class="settings-card">
                <h3>🔒 Security & Authentication</h3>
                <form id="passwordForm">
                    <div class="form-group">
                        <label for="old_pass">Current Password</label>
                        <input type="password" id="old_pass" name="old_pass" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="new_pass">New Strong Password</label>
                        <input type="password" id="new_pass" name="new_pass" placeholder="Minimum 6 characters" required>
                    </div>
                    <button type="submit" class="btn-save btn-password">🔑 Change Password</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const userId = localStorage.getItem("userId");
        if (!userId) {
            alert("⚠️ Session expired. Re-login required.");
            window.location.href = "login.html";
        }

        document.querySelector(".logout").addEventListener("click", () => {
            localStorage.clear();
        });

        // Fetch and show current threshold budget on load
        async function fetchCurrentBudget() {
            try {
                const response = await fetch('https://expense-tracker-y7d3.onrender.com/api/get-budget', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `userId=${userId}`
                });
                const data = await response.json();
                if (data.status === "success") {
                    document.getElementById("current_budget").value = `₹${parseFloat(data.budget).toFixed(2)}`;
                } else {
                    document.getElementById("current_budget").value = "₹0.00";
                }
            } catch (err) {
                console.error(err);
                document.getElementById("current_budget").value = "Error connecting...";
            }
        }
        window.onload = fetchCurrentBudget;

        // Process Budget Form Submission
        document.getElementById("budgetForm").addEventListener("submit", async(e) => {
            e.preventDefault();
            const newBudget = document.getElementById("new_budget").value;

            try {
                const response = await fetch('https://expense-tracker-y7d3.onrender.com/api/update-budget', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `userId=${userId}&newBudget=${newBudget}`
                });
                const data = await response.json();
                if (data.status === "success") {
                    alert("✅ Budget limit updated successfully!");
                    document.getElementById("new_budget").value = "";
                    fetchCurrentBudget();
                } else {
                    alert("❌ Error: " + data.message);
                }
            } catch (err) {
                alert("❌ Backend Server Connection Failure.");
            }
        });

        // Process Password Form Submission
        document.getElementById("passwordForm").addEventListener("submit", async(e) => {
            e.preventDefault();
            const oldPass = document.getElementById("old_pass").value;
            const newPass = document.getElementById("new_pass").value;

            if (newPass.length < 6) {
                alert("⚠️ New password must be at least 6 characters long.");
                return;
            }

            try {
                const response = await fetch('https://expense-tracker-y7d3.onrender.com/api/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `userId=${userId}&oldPass=${encodeURIComponent(oldPass)}&newPass=${encodeURIComponent(newPass)}`
                });
                const data = await response.json();
                if (data.status === "success") {
                    alert("✅ Password altered successfully!");
                    document.getElementById("old_pass").value = "";
                    document.getElementById("new_pass").value = "";
                } else {
                    alert("❌ Authentication Error: " + data.message);
                }
            } catch (err) {
                alert("❌ Backend Server Connection Failure.");
            }
        });
    </script>
</body>

</html>
