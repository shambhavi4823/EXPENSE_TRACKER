<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalletWise - Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .register-container {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-top: 5px solid #3498db;
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .register-header h2 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .register-header p {
            color: #7f8c8d;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eaeded;
            border-radius: 8px;
            font-size: 15px;
            color: #2c3e50;
            background-color: #fcfcfc;
            outline: none;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            border-color: #3498db;
            background-color: white;
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }
        
        .btn-submit:hover {
            background-color: #2980b9;
        }
        
        .form-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #7f8c8d;
        }
        
        .form-footer a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }
        
        .back-home {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #95a5a6;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="register-container">
        <div class="register-header">
            <h2>Create Account</h2>
            <p>Join ExpenseTracker to manage your expenses</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="example@gmail.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a strong password" required>
            </div>
            <div class="form-group">
                <label for="role">Select Role</label>
                <select id="role" required>
                    <option value="" disabled selected>Choose your role</option>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">Sign Up</button>
        </form>

        <div class="form-footer">
            Already have an account? <a href="login.html">Login here</a>
        </div>
        <a href="index.html" class="back-home">← Back to Home</a>
    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", async(e) => {
            e.preventDefault();
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const role = document.getElementById("role").value;

            try {
                const response = await fetch('http://localhost:8080/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&role=${encodeURIComponent(role)}`
                });
                const result = await response.json();
                if (result.status === "success") {
                    alert("✅ Registered successfully! Redirecting to sign-in panel...");
                    window.location.href = "login.html";
                } else {
                    alert("❌ Fail: " + result.message);
                }
            } catch (err) {
                alert("❌ Core Connection Timeout! Ensure main.java is running.");
            }
        });
    </script>
</body>

</html>
